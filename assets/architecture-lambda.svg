<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="t d"><title id="t">S3 Lambda file upload logger</title><desc id="d">A user uploads a file to S3, S3 triggers Lambda, and Lambda writes logs to CloudWatch.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0a1728"/><stop offset="1" stop-color="#07111f"/></linearGradient><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#ff9900"/></marker></defs><rect width="960" height="520" rx="28" fill="url(#bg)"/><text x="48" y="58" fill="#ffb84d" font-family="Arial" font-size="20" font-weight="700">EVENT-DRIVEN FILE LOGGING</text>
<rect x="55" y="190" width="165" height="120" rx="20" fill="#12243a" stroke="#7f8da3"/><text x="137" y="238" fill="white" font-family="Arial" font-size="24" text-anchor="middle" font-weight="700">User</text><text x="137" y="273" fill="#aab7c8" font-family="Arial" font-size="15" text-anchor="middle">Uploads object</text>
<rect x="300" y="165" width="180" height="170" rx="22" fill="#17263b" stroke="#ff9900" stroke-width="2"/><text x="390" y="228" fill="white" font-family="Arial" font-size="24" text-anchor="middle" font-weight="700">Amazon S3</text><text x="390" y="264" fill="#ffb84d" font-family="Arial" font-size="16" text-anchor="middle">Object-created event</text><text x="390" y="295" fill="#aab7c8" font-family="Arial" font-size="14" text-anchor="middle">Source bucket</text>
<rect x="550" y="165" width="180" height="170" rx="22" fill="#17263b" stroke="#ff9900" stroke-width="2"/><text x="640" y="228" fill="white" font-family="Arial" font-size="24" text-anchor="middle" font-weight="700">AWS Lambda</text><text x="640" y="264" fill="#ffb84d" font-family="Arial" font-size="16" text-anchor="middle">Triggered function</text><text x="640" y="295" fill="#aab7c8" font-family="Arial" font-size="14" text-anchor="middle">Processes metadata</text>
<rect x="790" y="190" width="130" height="120" rx="20" fill="#17263b" stroke="#3ea6ff" stroke-width="2"/><text x="855" y="237" fill="white" font-family="Arial" font-size="22" text-anchor="middle" font-weight="700">CloudWatch</text><text x="855" y="272" fill="#aab7c8" font-family="Arial" font-size="14" text-anchor="middle">Logs &amp; monitoring</text>
<path d="M220 250H290" stroke="#ff9900" stroke-width="4" marker-end="url(#arrow)"/><path d="M480 250H540" stroke="#ff9900" stroke-width="4" marker-end="url(#arrow)"/><path d="M730 250H780" stroke="#ff9900" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="314" y="383" width="402" height="68" rx="16" fill="#0e1d31" stroke="#3ea6ff"/><text x="515" y="414" fill="#dfe7f2" font-family="Arial" font-size="16" text-anchor="middle" font-weight="700">Event flow: Upload → Trigger → Function execution → Logs</text><text x="515" y="438" fill="#aab7c8" font-family="Arial" font-size="14" text-anchor="middle">Serverless and automatically invoked</text></svg>