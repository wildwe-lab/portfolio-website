<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-labelledby="t d">
<title id="t">Secure static website architecture</title><desc id="d">Users connect to CloudFront, which accesses a private S3 bucket through Origin Access Control.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0a1728"/><stop offset="1" stop-color="#07111f"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#ff9900"/></marker></defs>
<rect width="960" height="520" rx="28" fill="url(#bg)"/>
<text x="48" y="58" fill="#ffb84d" font-family="Arial" font-size="20" font-weight="700">SECURE STATIC WEBSITE</text>
<rect x="72" y="184" width="180" height="130" rx="20" fill="#12243a" stroke="#7f8da3"/><text x="162" y="235" fill="white" font-family="Arial" font-size="25" text-anchor="middle" font-weight="700">Visitor</text><text x="162" y="271" fill="#aab7c8" font-family="Arial" font-size="16" text-anchor="middle">Web browser</text>
<rect x="390" y="150" width="190" height="200" rx="22" fill="#17263b" stroke="#ff9900" stroke-width="2" filter="url(#glow)"/><text x="485" y="220" fill="white" font-family="Arial" font-size="25" text-anchor="middle" font-weight="700">CloudFront</text><text x="485" y="257" fill="#ffb84d" font-family="Arial" font-size="16" text-anchor="middle">CDN + HTTPS</text><text x="485" y="292" fill="#aab7c8" font-family="Arial" font-size="15" text-anchor="middle">Default root: index.html</text>
<rect x="714" y="184" width="180" height="130" rx="20" fill="#17263b" stroke="#ff9900" stroke-width="2"/><text x="804" y="235" fill="white" font-family="Arial" font-size="25" text-anchor="middle" font-weight="700">Amazon S3</text><text x="804" y="271" fill="#aab7c8" font-family="Arial" font-size="16" text-anchor="middle">Private origin bucket</text>
<path d="M252 249H380" stroke="#ff9900" stroke-width="4" marker-end="url(#arrow)"/><path d="M580 249H704" stroke="#ff9900" stroke-width="4" marker-end="url(#arrow)"/>
<text x="642" y="225" fill="#aab7c8" font-family="Arial" font-size="15" text-anchor="middle">Origin Access Control</text>
<rect x="660" y="370" width="234" height="72" rx="16" fill="#0e1d31" stroke="#3ea6ff"/><text x="777" y="400" fill="#dfe7f2" font-family="Arial" font-size="16" text-anchor="middle" font-weight="700">Block Public Access: ON</text><text x="777" y="426" fill="#aab7c8" font-family="Arial" font-size="14" text-anchor="middle">CloudFront-only bucket policy</text>
</svg>