<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="t d"><title id="t">Application and Network Load Balancer architecture</title><desc id="d">Public traffic enters through ALB or NLB listeners, reaches target groups, then two EC2 instances. Direct HTTP access to EC2 is blocked and SSH is limited to a trusted IP.</desc><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0a1728"/><stop offset="1" stop-color="#07111f"/></linearGradient><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#ff9900"/></marker></defs><rect width="960" height="560" rx="28" fill="url(#bg)"/><text x="48" y="58" fill="#ffb84d" font-family="Arial" font-size="20" font-weight="700">SECURE LOAD-BALANCED ARCHITECTURE</text>
<rect x="50" y="212" width="150" height="110" rx="18" fill="#12243a" stroke="#7f8da3"/><text x="125" y="255" fill="white" font-family="Arial" font-size="23" text-anchor="middle" font-weight="700">Internet</text><text x="125" y="289" fill="#aab7c8" font-family="Arial" font-size="14" text-anchor="middle">Public HTTP traffic</text>
<rect x="280" y="116" width="175" height="130" rx="20" fill="#17263b" stroke="#ff9900" stroke-width="2"/><text x="367" y="168" fill="white" font-family="Arial" font-size="23" text-anchor="middle" font-weight="700">ALB</text><text x="367" y="201" fill="#aab7c8" font-family="Arial" font-size="14" text-anchor="middle">HTTP listener</text>
<rect x="280" y="316" width="175" height="130" rx="20" fill="#17263b" stroke="#ff9900" stroke-width="2"/><text x="367" y="368" fill="white" font-family="Arial" font-size="23" text-anchor="middle" font-weight="700">NLB</text><text x="367" y="401" fill="#aab7c8" font-family="Arial" font-size="14" text-anchor="middle">Network listener</text>
<rect x="535" y="116" width="160" height="130" rx="20" fill="#0f2034" stroke="#3ea6ff"/><text x="615" y="165" fill="white" font-family="Arial" font-size="20" text-anchor="middle" font-weight="700">Target Group</text><text x="615" y="198" fill="#aab7c8" font-family="Arial" font-size="14" text-anchor="middle">ALB targets</text>
<rect x="535" y="316" width="160" height="130" rx="20" fill="#0f2034" stroke="#3ea6ff"/><text x="615" y="365" fill="white" font-family="Arial" font-size="20" text-anchor="middle" font-weight="700">Target Group</text><text x="615" y="398" fill="#aab7c8" font-family="Arial" font-size="14" text-anchor="middle">NLB targets</text>
<rect x="775" y="140" width="135" height="115" rx="18" fill="#17263b" stroke="#ff9900"/><text x="842" y="186" fill="white" font-family="Arial" font-size="21" text-anchor="middle" font-weight="700">EC2 #1</text><text x="842" y="219" fill="#aab7c8" font-family="Arial" font-size="13" text-anchor="middle">Private HTTP path</text>
<rect x="775" y="310" width="135" height="115" rx="18" fill="#17263b" stroke="#ff9900"/><text x="842" y="356" fill="white" font-family="Arial" font-size="21" text-anchor="middle" font-weight="700">EC2 #2</text><text x="842" y="389" fill="#aab7c8" font-family="Arial" font-size="13" text-anchor="middle">Private HTTP path</text>
<path d="M200 267L270 181" stroke="#ff9900" stroke-width="4" marker-end="url(#arrow)"/><path d="M200 267L270 381" stroke="#ff9900" stroke-width="4" marker-end="url(#arrow)"/><path d="M455 181H525" stroke="#ff9900" stroke-width="4" marker-end="url(#arrow)"/><path d="M455 381H525" stroke="#ff9900" stroke-width="4" marker-end="url(#arrow)"/><path d="M695 181H765" stroke="#ff9900" stroke-width="4" marker-end="url(#arrow)"/><path d="M695 381H765" stroke="#ff9900" stroke-width="4" marker-end="url(#arrow)"/>
<rect x="48" y="482" width="864" height="48" rx="14" fill="#0e1d31" stroke="#3ea6ff"/><text x="480" y="512" fill="#dfe7f2" font-family="Arial" font-size="15" text-anchor="middle" font-weight="700">Security: No direct public HTTP to EC2 · SSH restricted to trusted IP · Public traffic enters through load balancers</text></svg>